<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WACANA — The Crew</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f0b429;
      --gold2: #ffd166;
      --dark: #080c10;
      --dark2: #0e1520;
      --dark3: #141e2e;
      --glass: rgba(255,255,255,0.04);
      --border: rgba(240,180,41,0.18);
      --text: #e8e8f0;
      --sub: #8892a4;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── CANVAS PARTICLE BG ─── */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
    }

    /* ─── MAIN PAGE ─── */
    #main-page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 60px;
      transition: opacity 0.5s, transform 0.5s;
    }

    /* ─── HERO HEADER ─── */
    .hero {
      text-align: center;
      padding: 70px 20px 50px;
      position: relative;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 22px;
      backdrop-filter: blur(10px);
      background: rgba(240,180,41,0.06);
      animation: fadeDown 0.8s ease both;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 11rem);
      letter-spacing: 0.05em;
      line-height: 0.9;
      background: linear-gradient(135deg, #ffffff 0%, var(--gold) 50%, #ff9f1c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.9s ease 0.1s both;
      position: relative;
    }

    .hero h1::after {
      content: 'WACANA';
      position: absolute;
      inset: 0;
      background: none;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 1px rgba(240,180,41,0.15);
      transform: translate(3px, 3px);
      z-index: -1;
      background-clip: text;
    }

    .hero-sub {
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--sub);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeUp 0.9s ease 0.25s both;
    }

    .hero-line {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 24px auto 0;
      animation: scaleX 1s ease 0.4s both;
      transform-origin: center;
    }

    /* ─── MEMBERS GRID ─── */
    .members-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--sub);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 32px;
      animation: fadeUp 0.8s ease 0.5s both;
    }

    .members-row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 1080px;
    }

    .card {
      flex: 0 0 calc(20% - 15px);
      min-width: 160px;
      max-width: 200px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      backdrop-filter: blur(12px);
      transition: transform 0.4s cubic-bezier(.22,.68,0,1.2),
                  box-shadow 0.4s ease,
                  border-color 0.3s;
      animation: cardIn 0.7s cubic-bezier(.22,.68,0,1.2) both;
    }

    .card:nth-child(1) { animation-delay: 0.55s; }
    .card:nth-child(2) { animation-delay: 0.65s; }
    .card:nth-child(3) { animation-delay: 0.75s; }
    .card:nth-child(4) { animation-delay: 0.85s; }
    .card:nth-child(5) { animation-delay: 0.95s; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(240,180,41,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1;
    }

    .card:hover { 
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 24px 60px rgba(240,180,41,0.2), 0 0 0 1px rgba(240,180,41,0.3);
      border-color: rgba(240,180,41,0.4);
    }
    .card:hover::before { opacity: 1; }

    .card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
      filter: grayscale(20%);
    }

    .card:hover .card-img-wrap img {
      transform: scale(1.08);
      filter: grayscale(0%);
    }

    .card-img-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, rgba(8,12,16,0.9) 0%, transparent 100%);
    }

    .card-number {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--gold);
      opacity: 0.6;
      z-index: 2;
    }

    .card-info {
      padding: 14px 14px 16px;
    }

    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 6px;
    }

    .card-hobby-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .card-hobby {
      font-size: 0.72rem;
      color: var(--sub);
      line-height: 1.5;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .card:hover .card-cta { opacity: 1; }

    .card-cta svg {
      width: 10px;
      height: 10px;
      transition: transform 0.2s;
    }
    .card:hover .card-cta svg { transform: translateX(3px); }

    /* ─── DETAIL PAGE ─── */
    #detail-page {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #detail-page.active {
      opacity: 1;
      pointer-events: all;
    }

    .detail-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(8,12,16,0.92);
      backdrop-filter: blur(20px);
    }

    .detail-content {
      position: relative;
      z-index: 2;
      display: flex;
      width: 90%;
      max-width: 900px;
      gap: 50px;
      align-items: center;
      transform: translateY(40px) scale(0.95);
      transition: transform 0.6s cubic-bezier(.22,.68,0,1.2);
    }

    #detail-page.active .detail-content {
      transform: translateY(0) scale(1);
    }

    .detail-img-side {
      flex: 0 0 320px;
      position: relative;
    }

    .detail-img-frame {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    }

    .detail-img-frame img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
    }

    .detail-img-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(240,180,41,0.12) 0%, transparent 50%);
      z-index: 1;
    }

    .detail-accent {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 16px;
      left: 16px;
      border: 1px solid rgba(240,180,41,0.25);
      border-radius: 24px;
      z-index: -1;
    }

    .detail-badge {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gold);
      color: #080c10;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      padding: 6px 20px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .detail-text-side {
      flex: 1;
    }

    .detail-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      color: rgba(240,180,41,0.1);
      line-height: 1;
      margin-bottom: -20px;
    }

    .detail-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 6vw, 5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 40%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .detail-tagline {
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .detail-divider {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin-bottom: 24px;
    }

    .detail-section-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .detail-hobbies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }

    .hobby-tag {
      background: rgba(240,180,41,0.1);
      border: 1px solid rgba(240,180,41,0.25);
      color: var(--gold2);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 100px;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }

    .detail-desc {
      font-size: 0.88rem;
      color: var(--sub);
      line-height: 1.8;
      margin-bottom: 28px;
    }

    .detail-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }

    .stat-item { text-align: center; }

    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--sub);
      margin-top: 3px;
    }

    /* ─── BACK BUTTON ─── */
    #back-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 200;
      background: rgba(240,180,41,0.12);
      border: 1px solid rgba(240,180,41,0.3);
      color: var(--gold);
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 100px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transform: translateX(-20px);
      transition: opacity 0.4s, transform 0.4s, background 0.2s;
    }

    #back-btn.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateX(0);
    }

    #back-btn:hover {
      background: rgba(240,180,41,0.22);
    }

    /* ─── NAV DOTS ─── */
    .nav-dots {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .nav-dots.visible {
      opacity: 1;
      pointer-events: all;
    }

    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(240,180,41,0.3);
      border: 1px solid rgba(240,180,41,0.4);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .nav-dot.active {
      background: var(--gold);
      transform: scale(1.4);
    }

    /* ─── FOOTER ─── */
    footer {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 30px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: rgba(136,146,164,0.4);
      text-transform: uppercase;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes scaleX {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── SHIMMER SCAN LINE ─── */
    .card::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, rgba(240,180,41,0.05), transparent);
      transition: top 0.6s ease;
      z-index: 2;
    }
    .card:hover::after { top: 140%; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .card { flex: 0 0 calc(50% - 10px); max-width: none; }

      .detail-content {
        flex-direction: column;
        gap: 30px;
        width: 95%;
        max-height: 90vh;
        overflow-y: auto;
        padding: 20px;
      }

      .detail-img-side { flex: none; width: 200px; align-self: center; }
      .detail-name { font-size: 2.8rem; }
    }

    @media (max-width: 480px) {
      .card { flex: 0 0 calc(50% - 8px); }
      .members-row { gap: 12px; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- BACK BUTTON -->
<button id="back-btn" onclick="closeDetail()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
  Kembali
</button>

<!-- NAV DOTS (detail page) -->
<div class="nav-dots" id="nav-dots"></div>

<!-- ═══ MAIN PAGE ═══ -->
<div id="main-page">
  <div class="hero">
    <div class="hero-tag">✦ The Official Crew ✦</div>
    <h1>WACANA</h1>
    <p class="hero-sub">Five Legends · One Squad</p>
    <div class="hero-line"></div>
  </div>

  <p class="members-label">— Meet The Members —</p>

  <div class="members-row" id="members-row">
    <!-- Cards injected by JS -->
  </div>

  <footer>© 2025 No Gay Crew &nbsp;·&nbsp; Made with 🔥</footer>
</div>

<!-- ═══ DETAIL PAGE ═══ -->
<div id="detail-page">
  <div class="detail-backdrop" onclick="closeDetail()"></div>
  <div class="detail-content" id="detail-content">
    <!-- injected by JS -->
  </div>
</div>

<script>
  /* ─── MEMBERS DATA ─── */
  const members = [
    {
      id: 1,
      name: "Fathur",
      tagline: "The Artist & Gamer",
      hobbies: ["Menggambar", "Bermain Game"],
      desc: "Fathurahman adalah jiwa kreatif di balik No Gay Crew. Dengan tangan yang selalu siap menggambar dan mata yang tajam melihat dunia, ia menuangkan imajinasinya ke kanvas maupun layar game. Di antara semua anggota, dialah yang paling sering lupa tidur karena asik main game.",
      stats: [{ val: "∞", label: "Sketsa" }, { val: "GG", label: "Win Rate" }, { val: "#1", label: "Artist" }],
      img: "fat.png.jpeg"
    },
    {
      id: 2,
      name: "Izlal",
      tagline: "The Singer & Charmer",
      hobbies: ["Bernyanyi", "Menggoda Pria"],
      desc: "Izlal adalah bintang panggung No Gay Crew. Suaranya yang merdu mampu membunuh siapa saja yang mendengar, dan pesonanya tak tertandingi. Kalau ada yang meninggal mendadak di sekitar crew, hampir pasti Izlal ada di baliknya.",
      stats: [{ val: "🎵", label: "Hits" }, { val: "100%", label: "Pesona" }, { val: "✦", label: "Bintang" }],
      img: "iz.png.jpeg"
    },
    {
      id: 3,
      name: "Nabil",
      tagline: "The Singer & Comedian",
      hobbies: ["Bernyanyi", "Ngaloco"],
      desc: "Nabil adalah kombinasi unik antara seniman suara dan raja ngocok. Suaranya bisa bikin haru, tapi sekalinya mulai ngaloco, semua orang di sekitarnya dijamin sakit perut. Dia adalah mood booster resmi No Gay Crew.",
      stats: [{ val: "🎤", label: "Vokal" }, { val: "XD", label: "Humor" }, { val: "TOP", label: "Vibes" }],
      img: "edi.png.jpeg"
    },
    {
      id: 4,
      name: "Dean",
      tagline: "The Storyteller",
      hobbies: ["Bercerita", "Gosip"],
      desc: "Dean adalah ensiklopedia hidup No Gay Crew. Tidak ada satu cerita pun yang luput dari ingatannya. Mulai dari bintang porno, hingga gosip terhangat yang baru terjadi 5 menit lalu — Dean sudah tahu semuanya dan siap bercerita.",
      stats: [{ val: "📖", label: "Cerita" }, { val: "HOT", label: "Gosip" }, { val: "🗣️", label: "Orator" }],
      img : "dean.jpeg"
    },
    {
      id: 5,
      name: "Januar",
      tagline: "The Warrior & Athlete",
      hobbies: ["Silat", "Olahraga"],
      desc: "Januar adalah tulang punggung fisik No Gay Crew. Dengan disiplin silat PSHT dan dedikasi olahraga setiap hari, dia adalah yang paling sigma di antara semua anggota. Jangan macam-macam, karena Januar siap ciat ciattt.",
      stats: [{ val: "🥋", label: "Sabuk" }, { val: "FIT", label: "Kondisi" }, { val: "💪", label: "Otot" }],
      img: "janu.png.jpeg"
    }
  ];

  /* ─── BUILD CARDS ─── */
  const row = document.getElementById('members-row');
  members.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img-wrap">
        <span class="card-number">0${m.id}</span>
        <img src="${m.img}" alt="${m.name}" loading="lazy"/>
      </div>
      <div class="card-info">
        <div class="card-name">${m.name}</div>
        <div class="card-hobby-label">Hobi</div>
        <div class="card-hobby">${m.hobbies.join(' · ')}</div>
        <div class="card-cta">
          Lihat Profil
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openDetail(i));
    row.appendChild(card);
  });

  /* ─── BUILD NAV DOTS ─── */
  const dotsEl = document.getElementById('nav-dots');
  members.forEach((m, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot';
    dot.title = m.name;
    dot.addEventListener('click', () => openDetail(i));
    dotsEl.appendChild(dot);
  });

  let currentIndex = 0;

  function openDetail(index) {
    currentIndex = index;
    const m = members[index];
    const content = document.getElementById('detail-content');

    content.innerHTML = `
      <div class="detail-img-side">
        <div class="detail-img-frame">
          <img src="${m.img}" alt="${m.name}"/>
        </div>
        <div class="detail-accent"></div>
        <div class="detail-badge">${m.tagline}</div>
      </div>
      <div class="detail-text-side">
        <div class="detail-number">0${m.id}</div>
        <div class="detail-name">${m.name}</div>
        <div class="detail-tagline">✦ ${m.tagline} ✦</div>
        <div class="detail-divider"></div>

        <div class="detail-section-label">Hobi & Keahlian</div>
        <div class="detail-hobbies">
          ${m.hobbies.map(h => `<span class="hobby-tag">${h}</span>`).join('')}
        </div>

        <div class="detail-section-label">Tentang ${m.name}</div>
        <p class="detail-desc">${m.desc}</p>

        <div class="detail-stats">
          ${m.stats.map(s => `
            <div class="stat-item">
              <div class="stat-val">${s.val}</div>
              <div class="stat-label">${s.label}</div>
            </div>`).join('')}
        </div>
      </div>
    `;

    // Update dots
    document.querySelectorAll('.nav-dot').forEach((d, i) => {
      d.classList.toggle('active', i === index);
    });

    document.getElementById('detail-page').classList.add('active');
    document.getElementById('back-btn').classList.add('visible');
    document.getElementById('nav-dots').classList.add('visible');
    document.getElementById('main-page').style.opacity = '0';
    document.getElementById('main-page').style.pointerEvents = 'none';
  }

  function closeDetail() {
    document.getElementById('detail-page').classList.remove('active');
    document.getElementById('back-btn').classList.remove('visible');
    document.getElementById('nav-dots').classList.remove('visible');
    document.getElementById('main-page').style.opacity = '1';
    document.getElementById('main-page').style.pointerEvents = 'all';
  }

  // Keyboard nav
  document.addEventListener('keydown', e => {
    const dp = document.getElementById('detail-page');
    if (!dp.classList.contains('active')) return;
    if (e.key === 'ArrowRight') openDetail((currentIndex + 1) % members.length);
    if (e.key === 'ArrowLeft') openDetail((currentIndex - 1 + members.length) % members.length);
    if (e.key === 'Escape') closeDetail();
  });

  /* ─── PARTICLE CANVAS ─── */
  (function() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    const COUNT = 80;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = Math.random() * 1.5 + 0.3;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.alpha = Math.random() * 0.4 + 0.05;
        this.color = Math.random() > 0.7 ? '#f0b429' : '#ffffff';
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function init() {
      resize();
      particles = Array.from({ length: COUNT }, () => new Particle());
    }

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 100) {
            ctx.save();
            ctx.globalAlpha = (1 - dist / 100) * 0.08;
            ctx.strokeStyle = '#f0b429';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
            ctx.restore();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      drawLines();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { resize(); });
    init();
    loop();
  })();
</script>
</body>
</html>
